<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Объясни фразу ИИ</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Markdown renderer -->
  <script src="libs/marked.min.js"></script>

  <!-- VK Bridge SDK (требуется для работы в VK; инжектируется вручную) -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

  <!-- OK SDK -->
  <script src="https://api.ok.ru/js/fapi5.js"></script>
  <script src="https://api.ok.ru/js/sdk.js"></script>

  <script>
    // ── Block context menu (right-click + long-tap on mobile) ──
    document.addEventListener('contextmenu', e => e.preventDefault());

    // ── Block text selection via mouse / drag of images ──
    document.addEventListener('selectstart', e => {
      if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT') {
        e.preventDefault();
      }
    });
    document.addEventListener('dragstart', e => e.preventDefault());

    // ── Forward wheel events to parent (VK page) so it can scroll ──
    window.addEventListener('wheel', (e) => {
      window.parent.postMessage({ type: 'wheel', deltaY: e.deltaY, deltaX: e.deltaX }, '*');
    }, { passive: true });

    // ── Redirect wheel events that land outside #app-container to scroll it ──
    document.addEventListener('wheel', (e) => {
      const appContainer = document.getElementById('app-container');
      if (appContainer && !appContainer.contains(e.target)) {
        appContainer.scrollTop += e.deltaY;
        appContainer.scrollLeft += e.deltaX;
      }
    }, { passive: true });

    // Pull-to-refresh is blocked via CSS overscroll-behavior:contain on #app-container.
  </script>
</head>
<body>

<!-- ══════════════════════════════════════════
     APP CONTAINER — max-width wrapper
     ══════════════════════════════════════════ -->
<div id="app-container">

  <!-- ── Главный заголовок (общий для обоих экранов) ── -->
  <h1 id="main-title">Объясни фразу ИИ</h1>

  <!-- ── Панель статов (общая для обоих экранов) ── -->
  <div class="stats-panel" id="stats-panel">
    <div class="stat-item">
      <span class="stat-label">Объяснено:</span>
      <span class="stat-value" id="stat-completed">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Попытки:</span>
      <span class="stat-value" id="stat-attempts">0</span>
    </div>
    <div class="stat-item stat-item-energy">
      <span class="stat-label">Энергия:</span>
      <span class="stat-value" id="stat-energy">0</span>
      <button class="btn-energy-add" id="btn-energy-add" title="Получить энергию">+</button>
      <span class="promo-badge hidden" id="promo-badge">Акция</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       СТАРТОВЫЙ ЭКРАН
       ══════════════════════════════════════════ -->
  <div id="start-screen" class="hidden">
    <div id="dictionaries-container" class="dictionaries-container"></div>
  </div>

  <!-- ══════════════════════════════════════════
       ИГРОВОЙ ЭКРАН
       ══════════════════════════════════════════ -->
  <div id="game-container" class="hidden">

    <div id="level-indicator">Уровень 1</div>

    <!-- Кнопка назад -->
    <div class="btn-row">
      <button class="btn btn-back" id="btn-back">&#8592; Назад</button>
    </div>

    <!-- ── Доска 1 — зелёная ── -->
    <div class="board board-1" id="board-1">
      <h2 class="board-title">Заставь ИИ написать следующую фразу</h2>

      <div class="paper-container">
        <div class="white-paper">
          <span id="target-phrase">Загрузка…</span>
        </div>
      </div>
    </div>

    <!-- ── Доска 2 — синяя ── -->
    <div class="board board-2" id="board-2">
      <h2 class="board-title">Не используй следующие комбинации букв</h2>

      <div class="forbidden-words-container" id="forbidden-container"></div>
    </div>

    <!-- Кнопки управления запретами -->
    <div class="btn-row">
      <button class="btn btn-video" id="btn-remove-restriction">
        Убрать запрет 🎬
      </button>
      <button class="btn btn-cancel hidden" id="btn-cancel-selection">
        Отмена
      </button>
    </div>

    <!-- ── Ввод промта ── -->
    <div class="input-section">
      <textarea
        id="prompt-textarea"
        class="prompt-textarea"
        placeholder="Введите ваш промт здесь…"
        rows="5"
      ></textarea>

      <div id="validation-msg" class="validation-message"></div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-send-prompt" disabled>
          Отправить Prompt
        </button>
      </div>
    </div>

    <!-- ── Ответ нейросети ── -->
    <div class="response-section">
      <div class="response-box" id="response-box">
        <span class="placeholder-text">Ответ нейросети появится здесь</span>
      </div>

      <div class="result-btns hidden" id="result-btns">
        <button class="btn btn-video hidden" id="btn-retry">
          Попробовать ещё раз
        </button>
        <button class="btn btn-video hidden" id="btn-skip">
          Пропустить 🎬
        </button>
        <button class="btn btn-success hidden" id="btn-next-word">
          Перейти к следующему слову →
        </button>
      </div>
    </div>

  </div><!-- #game-container -->

</div><!-- #app-container -->

<!-- ══════════════════════════════════════════
     ENERGY MODAL
     ══════════════════════════════════════════ -->
<div class="overlay hidden" id="energy-modal">
  <div class="energy-modal">
    <button class="modal-close-btn" id="btn-energy-close">✕</button>
    <div class="energy-modal-icon">⚡</div>
    <h3 class="energy-modal-title">Энергия</h3>
    <div class="energy-modal-current">У вас <span id="modal-energy-value">0</span> ед.</div>
    <div class="energy-timer" id="energy-timer">—</div>
    <button class="btn btn-video" id="btn-energy-watch">Получить 5 единиц энергии 🎬</button>
    <div class="btn-buy-wrapper">
      <span class="discount-badge hidden" id="discount-badge"></span>
      <button class="btn btn-buy" id="btn-energy-buy">Купить 100 единиц энергии — 90 ₽</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     LOADING OVERLAY — скрывает UI до полной загрузки
     ══════════════════════════════════════════ -->
<div id="loading-overlay" class="loading-overlay">
  <div class="loading-content">
    <div class="loading-title">Объясни фразу ИИ</div>
    <div class="spinner-dots loading-dots">
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
    </div>
  </div>
</div>

<!-- Logic -->
<script src="game.js"></script>
</body>
</html>
